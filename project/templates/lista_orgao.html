{% extends "base.html" %}
{% block content %}

<div class="container">
<div class="jumbotron">


  <h5>Órgão</h5>


  <table class="table table-striped table-hover table-sm">
    <caption>Órgão</caption>
    <thead>
      <tr>
        <th scope="col"><p align="center">Sigla</p></th>
        <th scope="col"><p align="center">Nome</p></th>
        <th scope="col"><p align="center">Ações</p></th>
      </tr>
    </thead>
    <tbody>

    <tr>
        <td><p align="center">{{orgao.sigla}}</p></td>
        <td>{{orgao.nome}}</td>
        <td><p align="center">

        </p></td>
    </tr>

    </tbody>
  </table>

</div>
</div>
{% endblock %}
