{% extends "base.html" %}
{% block content %}

<div class="container">
<div class="jumbotron">

  
  <h5>Estrutura AI</h5>

<caption>
  <div class="row">
      <div class="col">
        {% if estrutura %}
          <p> <span class="badge badge-pill badge-primary">1</span> registro cadastrado.</p>
        {% endif %}
      </div>
  </div>
</caption>

  <table class="table table-striped table-hover table-sm">
    <caption>Estrutura AI</caption>
    <thead>
      <tr>
        <th scope="col"><p align="center">Peso Metas</p></th>
        <th scope="col"><p align="center">Peso Fatores</p></th>
        <th scope="col"><p align="center">Ações</p></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><p align="center">{{estrutura.peso_metas|decimal_com_virgula}}</p></td>
        <td><p align="center">{{estrutura.peso_fatores|decimal_com_virgula}}</p></td>
        <td><p align="center">
          <a href="{{url_for('core.edit_estrutura_ai', estrutura_id=estrutura.id)}}" class="btn btn-sm btn-warning">Editar</a>
        </p></td>
      </tr>
    </tbody>
  </table>

</div>
</div
{% endblock %}
